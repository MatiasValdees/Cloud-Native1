networks:
  app-net:
    driver: bridge

volumes:
  mysql-data:

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    networks: [app-net]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: monitor_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  location-producer:
    build:
      context: ./location-producer
    container_name: location-producer
    networks: [app-net]
    ports:
      - "8080:8080"

  schedule-processor:
    build:
      context: ./schedule-processor
    container_name: schedule-processor
    networks: [app-net]
    ports:
      - "8081:8081"

  monitor-service:
    build:
      context: ./monitor-service
    container_name: monitor-service
    networks: [app-net]
    ports:
      - "8082:8082"
    depends_on:
      - mysql